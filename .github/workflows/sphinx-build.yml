name: Build and Push Sphinx Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SE_docs
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Sphinx dependencies
        run: |
          pip install sphinx sphinx-rtd-theme myst-parser \
            jupyter-sphinx nbsphinx ipykernel

      - name: Build HTML docs
        run: make html

      - name: Commit and push build/html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build/html/
          git diff --cached --quiet || git commit -m "Auto-build Sphinx docs"
          git push
